scalar UUID
scalar JSON
scalar DateTime

type Identity {
  id: UUID!
  externalId: String
  name: String!
  type: String!
  metadata: JSON
  createdAt: DateTime!
  updatedAt: DateTime!
}

type ResourceType {
  id: UUID!
  name: String!
  description: String
  jsonSchema: JSON!
  transitions: JSON!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type Resource {
  id: UUID!
  type: ResourceType!
  state: String!
  metadata: JSON!
  createdAt: DateTime!
  updatedAt: DateTime!
  revisions(first: Int, after: String): RevisionConnection!
}

type Event {
  id: UUID!
  resource: Resource
  identity: Identity!
  type: String!
  payload: JSON!
  natsMessageId: UUID
  createdAt: DateTime!
}

type Revision {
  id: UUID!
  resource: Resource!
  identity: Identity!
  snapshot: JSON!
  filePath: String
  downloadUrl: String
  createdAt: DateTime!
}

type Permission {
  id: UUID!
  identity: Identity!
  resource: Resource
  resourceType: ResourceType
  action: String!
  expiresAt: DateTime
  createdAt: DateTime!
}

# --- Results ---

type MutationError {
  code: String!
  message: String!
}

type IdentityResult {
  success: Boolean!
  identity: Identity
  error: MutationError
}

type ResourceResult {
  success: Boolean!
  resource: Resource
  error: MutationError
}

type ResourceTypeResult {
  success: Boolean!
  resourceType: ResourceType
  error: MutationError
}

type PermissionResult {
  success: Boolean!
  permission: Permission
  error: MutationError
}

type RevisionResult {
  success: Boolean!
  revision: Revision
  error: MutationError
}

type ProvisioningResult {
  success: Boolean!
  moduleName: String
  schema: String
  username: String
  password: String
  connectionString: String
  bucketName: String
  error: MutationError
}

type UploadResult {
  success: Boolean!
  url: String
  filePath: String
  error: MutationError
}

# --- Connections (Pagination) ---

type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
  endCursor: String
}

type ResourceConnection {
  edges: [ResourceEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type ResourceEdge {
  cursor: String!
  node: Resource!
}

type EventConnection {
  edges: [EventEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type EventEdge {
  cursor: String!
  node: Event!
}

type RevisionConnection {
  edges: [RevisionEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type RevisionEdge {
  cursor: String!
  node: Revision!
}

type IdentityConnection {
  edges: [IdentityEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type IdentityEdge {
  cursor: String!
  node: Identity!
}

# --- Inputs ---

input CreateIdentityInput {
  externalId: String!
  name: String!
  type: String!
  metadata: JSON
}

input UploadFileInput {
  fileName: String!
  fileContent: String! 
  contentType: String
}

input CreateResourceInput {
  typeName: String!
  initialState: String!
  metadata: JSON
}

input TransitionResourceInput {
  resourceId: UUID!
  toState: String!
  metadata: JSON
}

input RegisterResourceTypeInput {
  name: String!
  description: String
  jsonSchema: JSON!
  transitions: JSON!
}

input GrantPermissionInput {
  identityId: UUID!
  resourceId: UUID
  resourceTypeId: UUID
  action: String!
  expiresAt: DateTime
}

input CreateRevisionInput {
  resourceId: UUID!
  fileContent: String 
  fileName: String
}

type ModuleInfo {
  name: String!
  schemaName: String!
  pgUsername: String!
  bucketName: String!
  identity: Identity
  provisionedAt: DateTime!
}

# --- Roots ---

type Query {
  resource(id: UUID!): Resource
  resources(first: Int, after: String, typeName: String, state: String, createdAfter: DateTime, createdBefore: DateTime): ResourceConnection!
  resourceType(name: String!): ResourceType
  resourceTypes: [ResourceType!]!
  identity(id: UUID!): Identity
  identities(type: String, first: Int, after: String): IdentityConnection!
  events(resourceId: UUID, identityId: UUID, type: String, first: Int, after: String): EventConnection!
  permissions(identityId: UUID, resourceId: UUID, resourceTypeId: UUID): [Permission!]!
  provisionedModules: [ModuleInfo!]!
  module(name: String!): ModuleInfo
}

type DeprovisionResult {
  success: Boolean!
  postgresCleared: Boolean!
  storageCleared: Boolean!
  storageSkippedReason: String
  korsDataCleared: Boolean!
  error: MutationError
}

type Mutation {
  createIdentity(input: CreateIdentityInput!): IdentityResult!
  deleteResource(id: UUID!): ResourceResult!
  registerResourceType(input: RegisterResourceTypeInput!): ResourceTypeResult!
  createResource(input: CreateResourceInput!): ResourceResult!
  transitionResource(input: TransitionResourceInput!): ResourceResult!
  grantPermission(input: GrantPermissionInput!): PermissionResult!
  createRevision(input: CreateRevisionInput!): RevisionResult!
  provisionModule(moduleName: String!): ProvisioningResult!
  deprovisionModule(moduleName: String!, forceDeleteStorage: Boolean): DeprovisionResult!
  rotateModuleCredentials(moduleName: String!): ProvisioningResult!
  uploadFile(input: UploadFileInput!): UploadResult!
}

type Subscription {
  eventWasPublished: Event!
  resourceEvents(resourceId: UUID!): Event!
}
