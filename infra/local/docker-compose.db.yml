# =============================================================================
# KORS — PostgreSQL 16 + TimescaleDB
# Une seule instance PostgreSQL avec l'extension TimescaleDB activee.
# TimescaleDB gere les hypertables pour les series temporelles (TRS, IoT).
# PostgreSQL gere les donnees metier OLTP (OF, QMS, NC, utilisateurs).
# L'init script active l'extension et cree la base au premier demarrage.
# =============================================================================

services:
  postgres:
    image: timescale/timescaledb:latest-pg18
    container_name: kors-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Active TimescaleDB comme extension preloadee
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=fr_FR.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./config/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - kors-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
