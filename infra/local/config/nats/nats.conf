# =============================================================================
# KORS — Configuration NATS (dev local)
# JetStream active avec stockage fichier pour la persistance entre redemarrages.
# Le Leaf Node est commente — a activer quand on connecte un site Edge au Hub Cloud.
# WebSocket active pour les clients navigateur (React via BFF).
# =============================================================================

server_name: kors-local

# Ports
port: 4222
http_port: 8222

# JetStream — persistance des evenements metier
jetstream {
  store_dir: /data/jetstream
  max_memory_store: 512MB
  max_file_store: 2GB
}

# WebSocket — connexions navigateur
websocket {
  port: 8080
  no_tls: true   # TLS gere par Traefik en production, pas en dev local
}

# Logging
logtime: true
debug: false
trace: false

# Limites adaptees au dev local
max_payload: 8MB
max_connections: 1000

