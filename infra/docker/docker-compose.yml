services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: kors
      POSTGRES_PASSWORD: kors_dev_secret
      POSTGRES_DB: kors
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  nats:
    image: nats:2.10-alpine
    command: ["-js"]
    ports:
      - "4222:4222"
      - "8222:8222"

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: kors_admin
      MINIO_ROOT_PASSWORD: kors_dev_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  keycloak:
    image: quay.io/keycloak/keycloak:21.1
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8180:8080"

  kors-api:
    build:
      context: ../../
      dockerfile: kors-api/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DATABASE_URL=postgres://kors:kors_dev_secret@postgres:5432/kors?sslmode=disable
      - NATS_URL=nats://nats:4222
    depends_on:
      - postgres
      - nats

  kors-events:
    build:
      context: ../../
      dockerfile: kors-events/Dockerfile
    environment:
      - DATABASE_URL=postgres://kors:kors_dev_secret@postgres:5432/kors?sslmode=disable
      - NATS_URL=nats://nats:4222
    depends_on:
      - postgres
      - nats

volumes:
  postgres_data:
  minio_data:
