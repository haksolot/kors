extend schema
  @link(url: "https://specs.apollo.dev/federation/v2.3",
        import: ["@key", "@extends", "@external"])

scalar UUID

# On étend le type Resource de KORS
type Resource @key(fields: "id") {
  id: UUID! @external
  # Données propres au module TMS
  diameter: Float
  length: Float
}

type Query {
  # Pour le test, on peut rajouter un getter spécifique au module
  tools: [Resource!]!
}
