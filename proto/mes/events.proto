syntax = "proto3";

package mes;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/haksolot/kors/proto/gen/mes;mes";

// All events published by the MES service to NATS JetStream.
// NATS subjects follow the convention: kors.mes.{entity}.{past_tense_verb}
// Payloads are serialized with proto.Marshal (never JSON).

// OFCreatedEvent is published on kors.mes.of.created.
message OFCreatedEvent {
  string event_id   = 1; // UUID — used for consumer idempotency checks
  string of_id      = 2;
  string reference  = 3;
  string product_id = 4;
  int32  quantity   = 5;
  google.protobuf.Timestamp created_at = 6;
}

// OFStartedEvent is published on kors.mes.of.started
// when the first operation of an OF begins.
message OFStartedEvent {
  string event_id  = 1;
  string of_id     = 2;
  google.protobuf.Timestamp started_at = 3;
}

// OFCompletedEvent is published on kors.mes.of.completed
// when all operations of an OF are completed.
message OFCompletedEvent {
  string event_id  = 1;
  string of_id     = 2;
  google.protobuf.Timestamp completed_at = 3;
}

// OFSuspendedEvent is published on kors.mes.of.suspended.
message OFSuspendedEvent {
  string event_id = 1;
  string of_id    = 2;
  string reason   = 3;
  google.protobuf.Timestamp suspended_at = 4;
}

// OFCancelledEvent is published on kors.mes.of.cancelled.
message OFCancelledEvent {
  string event_id = 1;
  string of_id    = 2;
  string reason   = 3;
  google.protobuf.Timestamp cancelled_at = 4;
}

// OperationStartedEvent is published on kors.mes.operation.started.
message OperationStartedEvent {
  string event_id      = 1;
  string operation_id  = 2;
  string of_id         = 3;
  string operator_id   = 4;
  int32  step_number   = 5;
  google.protobuf.Timestamp started_at = 6;
}

// OperationCompletedEvent is published on kors.mes.operation.completed.
message OperationCompletedEvent {
  string event_id      = 1;
  string operation_id  = 2;
  string of_id         = 3;
  string operator_id   = 4;
  int32  step_number   = 5;
  google.protobuf.Timestamp completed_at    = 6;
  // Cycle-time fields (BLOC 5 — TRS)
  int32 planned_duration_seconds = 7;
  int32 actual_duration_seconds  = 8;
}

// OFResumedEvent is published on kors.mes.of.resumed.
message OFResumedEvent {
  string event_id = 1;
  string of_id    = 2;
  google.protobuf.Timestamp resumed_at = 3;
}

// OperationSkippedEvent is published on kors.mes.operation.skipped.
message OperationSkippedEvent {
  string event_id     = 1;
  string operation_id = 2;
  string of_id        = 3;
  int32  step_number  = 4;
  string reason       = 5;
  google.protobuf.Timestamp skipped_at = 6;
}

// OperationSignedOffEvent is published on kors.mes.operation.signed_off (AS9100D §8.6).
message OperationSignedOffEvent {
  string event_id      = 1;
  string operation_id  = 2;
  string of_id         = 3;
  int32  step_number   = 4;
  string inspector_id  = 5; // UUID of the quality_inspector
  google.protobuf.Timestamp signed_off_at = 6;
}

// NCDeclaredEvent is published on kors.mes.nc.declared (AS9100D §8.7).
// Consumed by the QMS service to open a NonConformity record.
message NCDeclaredEvent {
  string event_id          = 1;
  string operation_id      = 2;
  string of_id             = 3;
  string defect_code       = 4;
  string description       = 5;
  int32  affected_quantity = 6;
  repeated string serial_numbers = 7;
  string declared_by       = 8;
  google.protobuf.Timestamp declared_at = 9;
}

// OFFAIApprovedEvent is published on kors.mes.of.fai_approved (AS9100D §8.6).
message OFFAIApprovedEvent {
  string event_id     = 1;
  string of_id        = 2;
  string approver_id  = 3; // UUID of the quality_manager
  google.protobuf.Timestamp approved_at = 4;
}

// RoutingCreatedEvent is published on kors.mes.routing.created (BLOC 5).
message RoutingCreatedEvent {
  string event_id   = 1;
  string routing_id = 2;
  string product_id = 3;
  int32  version    = 4;
  string name       = 5;
  google.protobuf.Timestamp created_at = 6;
}

// QualificationCreatedEvent is published on kors.mes.qualification.created (AS9100D §7.2).
message QualificationCreatedEvent {
  string event_id          = 1;
  string qualification_id  = 2;
  string operator_id       = 3;
  string skill             = 4;
  string granted_by        = 5;
  google.protobuf.Timestamp expires_at  = 6;
  google.protobuf.Timestamp created_at  = 7;
}

// QualificationRenewedEvent is published on kors.mes.qualification.renewed (AS9100D §7.2).
message QualificationRenewedEvent {
  string event_id          = 1;
  string qualification_id  = 2;
  string operator_id       = 3;
  string skill             = 4;
  string renewed_by        = 5;
  google.protobuf.Timestamp new_expires_at = 6;
  google.protobuf.Timestamp renewed_at     = 7;
}

// QualificationRevokedEvent is published on kors.mes.qualification.revoked (AS9100D §7.2).
message QualificationRevokedEvent {
  string event_id          = 1;
  string qualification_id  = 2;
  string operator_id       = 3;
  string skill             = 4;
  string revoked_by        = 5;
  string reason            = 6;
  google.protobuf.Timestamp revoked_at = 7;
}

// QualificationExpiredEvent is published on kors.mes.qualification.expired
// by the qualification alert scanner when a qualification passes its expires_at.
message QualificationExpiredEvent {
  string event_id          = 1;
  string qualification_id  = 2;
  string operator_id       = 3;
  string skill             = 4;
  google.protobuf.Timestamp expired_at = 5;
}

// QualificationExpiringAlertEvent is published on kors.mes.qualification.expiring_alert
// by the qualification alert scanner when a qualification is within the warning window.
message QualificationExpiringAlertEvent {
  string event_id          = 1;
  string qualification_id  = 2;
  string operator_id       = 3;
  string skill             = 4;
  google.protobuf.Timestamp expires_at  = 5;
  int32  days_remaining    = 6;
}

// WorkstationCreatedEvent is published on kors.mes.workstation.created
message WorkstationCreatedEvent {
  string event_id = 1;
  string workstation_id = 2;
  string name = 3;
  int32 capacity = 4;
  double nominal_rate = 5;
  google.protobuf.Timestamp created_at = 6;
}

// WorkstationStatusChangedEvent is published on kors.mes.workstation.status_changed
message WorkstationStatusChangedEvent {
  string event_id = 1;
  string workstation_id = 2;
  string old_status = 3;
  string new_status = 4;
  google.protobuf.Timestamp changed_at = 5;
}

// TimeLogRecordedEvent is published on kors.mes.timelog.recorded
message TimeLogRecordedEvent {
  string event_id = 1;
  string time_log_id = 2;
  string operation_id = 3;
  string workstation_id = 4;
  int32 duration_seconds = 5;
  int32 good_quantity = 6;
  int32 scrap_quantity = 7;
}

// DowntimeStartedEvent is published on kors.mes.downtime.started
message DowntimeStartedEvent {
  string event_id = 1;
  string downtime_id = 2;
  string workstation_id = 3;
  string category = 4;
  google.protobuf.Timestamp start_time = 5;
}

// DowntimeEndedEvent is published on kors.mes.downtime.ended
message DowntimeEndedEvent {
  string event_id = 1;
  string downtime_id = 2;
  string workstation_id = 3;
  int32 duration_seconds = 4;
  google.protobuf.Timestamp end_time = 5;
}
