syntax = "proto3";

package mes;

import "google/protobuf/timestamp.proto";
import "mes/operation.proto";

option go_package = "github.com/haksolot/kors/proto/gen/mes;mes";

// OrderStatus represents the lifecycle state of a manufacturing order.
enum OrderStatus {
  ORDER_STATUS_UNSPECIFIED = 0;
  ORDER_STATUS_PLANNED     = 1;
  ORDER_STATUS_IN_PROGRESS = 2;
  ORDER_STATUS_COMPLETED   = 3;
  ORDER_STATUS_SUSPENDED   = 4;
  ORDER_STATUS_CANCELLED   = 5;
}

// ManufacturingOrder is the central aggregate of the MES.
// An OF (Ordre de Fabrication) tracks production of a product lot.
message ManufacturingOrder {
  string id         = 1; // UUID
  string reference  = 2; // Human-readable reference, e.g. "OF-2026-001"
  string product_id = 3; // UUID of the product to manufacture
  int32  quantity   = 4; // Number of units to produce
  OrderStatus status = 5;

  google.protobuf.Timestamp created_at  = 6;
  google.protobuf.Timestamp updated_at  = 7;
  google.protobuf.Timestamp started_at  = 8;  // set when status → IN_PROGRESS
  google.protobuf.Timestamp completed_at = 9; // set when status → COMPLETED

  // FAI (First Article Inspection) fields (AS9100D §8.6)
  bool   is_fai          = 10; // true if this order requires FAI approval
  string fai_approved_by = 11; // UUID of the quality_manager who approved
  google.protobuf.Timestamp fai_approved_at = 12;

  // Planning fields (BLOC 5)
  google.protobuf.Timestamp due_date = 13; // target completion date
  int32 priority                     = 14; // 1 (lowest) – 100 (highest)
}

// --- Request / Reply messages (NATS Request-Reply) ---

// CreateOrderRequest is sent on kors.mes.of.create to create a new OF.
message CreateOrderRequest {
  string reference  = 1;
  string product_id = 2;
  int32  quantity   = 3;
  // Optional planning fields
  google.protobuf.Timestamp due_date = 4;
  int32 priority                     = 5; // 0 means use default (50)
  bool  is_fai                       = 6;
}

// CreateOrderResponse contains the created order.
message CreateOrderResponse {
  ManufacturingOrder order = 1;
}

// GetOrderRequest is sent on kors.mes.of.get.
message GetOrderRequest {
  string id = 1;
}

// GetOrderResponse contains the requested order.
message GetOrderResponse {
  ManufacturingOrder order = 1;
}

// ListOrdersRequest is sent on kors.mes.of.list.
message ListOrdersRequest {
  OrderStatus status_filter = 1; // optional; UNSPECIFIED means all
  int32  page_size  = 2; // max 100
  string page_token = 3; // opaque cursor from previous response
}

// ListOrdersResponse contains a page of manufacturing orders.
message ListOrdersResponse {
  repeated ManufacturingOrder orders = 1;
  string next_page_token = 2; // empty if last page
}

// SuspendOrderRequest is sent on kors.mes.of.suspend.
message SuspendOrderRequest {
  string id     = 1;
  string reason = 2;
}

// SuspendOrderResponse contains the updated order.
message SuspendOrderResponse {
  ManufacturingOrder order = 1;
}

// ResumeOrderRequest is sent on kors.mes.of.resume.
message ResumeOrderRequest {
  string id = 1;
}

// ResumeOrderResponse contains the updated order.
message ResumeOrderResponse {
  ManufacturingOrder order = 1;
}

// CancelOrderRequest is sent on kors.mes.of.cancel.
message CancelOrderRequest {
  string id     = 1;
  string reason = 2;
}

// CancelOrderResponse contains the updated order.
message CancelOrderResponse {
  ManufacturingOrder order = 1;
}

// ApproveFAIRequest is sent on kors.mes.of.fai_approve (AS9100D §8.6).
// approver_id must be extracted from a validated JWT with role quality_manager (BFF responsibility).
message ApproveFAIRequest {
  string of_id       = 1;
  string approver_id = 2; // UUID of quality_manager extracted from JWT by BFF
}

// ApproveFAIResponse contains the updated order.
message ApproveFAIResponse {
  ManufacturingOrder order = 1;
}

// DispatchListRequest is sent on kors.mes.of.dispatch_list.
// Returns PLANNED + IN_PROGRESS orders sorted by priority DESC, due_date ASC.
message DispatchListRequest {
  int32 limit = 1; // max results; 0 defaults to 50
}

// DispatchListResponse contains the ordered dispatch list.
message DispatchListResponse {
  repeated ManufacturingOrder orders = 1;
}

// CreateFromRoutingRequest is sent on kors.mes.of.create_from_routing.
// Creates an OF and instantiates all operations from a routing template in one transaction.
message CreateFromRoutingRequest {
  string routing_id = 1;
  string reference  = 2;
  int32  quantity   = 3;
  // Optional planning
  google.protobuf.Timestamp due_date = 4;
  int32 priority                     = 5; // 0 means use default (50)
  bool  is_fai                       = 6;
}

// CreateFromRoutingResponse contains the created order and its operations.
message CreateFromRoutingResponse {
  ManufacturingOrder       order      = 1;
  repeated Operation       operations = 2;
}

// SetPlanningRequest is sent on kors.mes.of.set_planning.
// Updates due_date and priority on an existing order.
message SetPlanningRequest {
  string of_id    = 1;
  google.protobuf.Timestamp due_date = 2; // optional
  int32 priority  = 3; // 1-100
}

// SetPlanningResponse contains the updated order.
message SetPlanningResponse {
  ManufacturingOrder order = 1;
}
