syntax = "proto3";

package mes;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/haksolot/kors/proto/gen/mes;mes";

// OperationStatus represents the lifecycle state of a production operation.
enum OperationStatus {
  OPERATION_STATUS_UNSPECIFIED     = 0;
  OPERATION_STATUS_PENDING         = 1; // waiting for the previous step to complete
  OPERATION_STATUS_IN_PROGRESS     = 2;
  OPERATION_STATUS_COMPLETED       = 3;
  OPERATION_STATUS_SKIPPED         = 4; // explicitly skipped with justification
  // PENDING_SIGN_OFF: work done, awaiting quality_inspector sign-off (AS9100D §8.6 hold point).
  OPERATION_STATUS_PENDING_SIGN_OFF = 5;
  // RELEASED: sign-off accepted; operation fully released.
  OPERATION_STATUS_RELEASED        = 6;
}

// Operation is a single production step within a ManufacturingOrder.
// Steps are ordered by step_number (1-based).
message Operation {
  string id             = 1; // UUID
  string of_id          = 2; // Parent ManufacturingOrder UUID
  int32  step_number    = 3; // Execution order within the OF
  string name           = 4; // e.g. "Découpe", "Soudure", "Contrôle visuel"
  string operator_id    = 5; // UUID of the operator assigned (from JWT claims)
  OperationStatus status = 6;

  google.protobuf.Timestamp created_at   = 7;
  google.protobuf.Timestamp started_at   = 8;
  google.protobuf.Timestamp completed_at = 9;

  string skip_reason = 10; // mandatory if status = SKIPPED

  // Hold-point / sign-off fields (AS9100D §8.6)
  bool   requires_sign_off = 11; // if true, Complete → PENDING_SIGN_OFF instead of COMPLETED
  string signed_off_by     = 12; // UUID of the quality_inspector who signed off
  google.protobuf.Timestamp signed_off_at = 13;

  // instructions_url: reference to a work instruction document in MinIO.
  string instructions_url = 14;
}

// --- Request / Reply messages ---

// StartOperationRequest is sent on kors.mes.operation.start.
message StartOperationRequest {
  string operation_id = 1;
  string operator_id  = 2; // extracted from JWT claims at the BFF, never trusted from client
}

// StartOperationResponse contains the updated operation.
message StartOperationResponse {
  Operation operation = 1;
}

// CompleteOperationRequest is sent on kors.mes.operation.complete.
message CompleteOperationRequest {
  string operation_id = 1;
  string operator_id  = 2;
}

// CompleteOperationResponse contains the updated operation.
message CompleteOperationResponse {
  Operation operation = 1;
}

// CreateOperationRequest is sent on kors.mes.operation.create.
message CreateOperationRequest {
  string of_id       = 1;
  int32  step_number = 2;
  string name        = 3;
}

// CreateOperationResponse contains the created operation.
message CreateOperationResponse {
  Operation operation = 1;
}

// SkipOperationRequest is sent on kors.mes.operation.skip.
message SkipOperationRequest {
  string operation_id = 1;
  string reason       = 2;
}

// SkipOperationResponse contains the updated operation.
message SkipOperationResponse {
  Operation operation = 1;
}

// GetOperationRequest is sent on kors.mes.operation.get.
message GetOperationRequest {
  string id = 1;
}

// GetOperationResponse contains the requested operation.
message GetOperationResponse {
  Operation operation = 1;
}

// ListOperationsRequest is sent on kors.mes.operation.list.
message ListOperationsRequest {
  string of_id = 1;
}

// ListOperationsResponse contains all operations for a manufacturing order.
message ListOperationsResponse {
  repeated Operation operations = 1;
}

// SignOffOperationRequest is sent on kors.mes.operation.sign_off (AS9100D §8.6).
// inspector_id must be extracted from a validated JWT with role quality_inspector (BFF responsibility).
message SignOffOperationRequest {
  string operation_id  = 1;
  string inspector_id  = 2; // UUID of quality_inspector extracted from JWT by BFF
}

// SignOffOperationResponse contains the updated operation.
message SignOffOperationResponse {
  Operation operation = 1;
}

// DeclareNCRequest is sent on kors.mes.operation.declare_nc (AS9100D §8.7).
// The MES publishes kors.mes.nc.declared via the outbox; no NC table in MES.
message DeclareNCRequest {
  string operation_id       = 1;
  string of_id              = 2;
  string defect_code        = 3; // e.g. "DIM_OUT_OF_TOLERANCE", "SURFACE_DEFECT"
  string description        = 4;
  int32  affected_quantity  = 5;
  repeated string serial_numbers = 6; // SNs affected, if known
  string declared_by        = 7; // UUID of the operator/inspector extracted from JWT by BFF
}

// DeclareNCResponse acknowledges the NC declaration.
message DeclareNCResponse {
  string event_id = 1; // outbox event ID for tracing
}

// AttachInstructionsRequest is sent on kors.mes.operation.attach_instructions.
message AttachInstructionsRequest {
  string operation_id     = 1;
  string instructions_url = 2; // MinIO URL, e.g. "minio://instructions/sop-weld-v3.pdf"
}

// AttachInstructionsResponse contains the updated operation.
message AttachInstructionsResponse {
  Operation operation = 1;
}
