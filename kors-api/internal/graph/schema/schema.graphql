extend schema
  @link(url: "https://specs.apollo.dev/federation/v2.3",
        import: ["@key", "@shareable", "@extends", "@external"])

scalar UUID
scalar JSON
scalar DateTime

# --- KORS Primitives (Federated Entities) ---

type Identity @key(fields: "id") {
  id: UUID!
  externalId: String
  name: String!
  type: String!
  metadata: JSON
  createdAt: DateTime!
  updatedAt: DateTime!
}

type ResourceType @key(fields: "id") {
  id: UUID!
  name: String!
  description: String
  jsonSchema: JSON!
  transitions: JSON!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type Resource @key(fields: "id") {
  id: UUID!
  type: ResourceType!
  state: String!
  metadata: JSON!
  createdAt: DateTime!
  updatedAt: DateTime!
  revisions(first: Int, after: String): RevisionConnection!
}

type Event @key(fields: "id") {
  id: UUID!
  resource: Resource
  identity: Identity!
  type: String!
  payload: JSON!
  natsMessageId: UUID
  createdAt: DateTime!
}

type Revision @key(fields: "id") {
  id: UUID!
  resource: Resource!
  identity: Identity!
  snapshot: JSON!
  filePath: String
  downloadUrl: String
  createdAt: DateTime!
}

type Permission @key(fields: "id") {
  id: UUID!
  identity: Identity!
  resource: Resource
  resourceType: ResourceType
  action: String!
  expiresAt: DateTime
  createdAt: DateTime!
}

# --- Results ---

type MutationError {
  code: String!
  message: String!
}

type IdentityResult {
  success: Boolean!
  identity: Identity
  error: MutationError
}

type ResourceResult {
  success: Boolean!
  resource: Resource
  error: MutationError
}

type ResourceTypeResult {
  success: Boolean!
  resourceType: ResourceType
  error: MutationError
}

type PermissionResult {
  success: Boolean!
  permission: Permission
  error: MutationError
}

type RevisionResult {
  success: Boolean!
  revision: Revision
  error: MutationError
}

type ProvisioningResult {
  success: Boolean!
  moduleName: String
  schema: String
  username: String
  password: String
  error: MutationError
}

type UploadResult {
  success: Boolean!
  url: String
  filePath: String
  error: MutationError
}

# --- Connections (Pagination) ---

type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
  endCursor: String
}

type ResourceConnection {
  edges: [ResourceEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type ResourceEdge {
  cursor: String!
  node: Resource!
}

type EventConnection {
  edges: [EventEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type EventEdge {
  cursor: String!
  node: Event!
}

type RevisionConnection {
  edges: [RevisionEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type RevisionEdge {
  cursor: String!
  node: Revision!
}

# --- Inputs ---

input CreateIdentityInput {
  externalId: String!
  name: String!
  type: String!
  metadata: JSON
}

input UploadFileInput {
  fileName: String!
  fileContent: String! 
  contentType: String
}

input CreateResourceInput {
  typeName: String!
  initialState: String!
  metadata: JSON
}

input TransitionResourceInput {
  resourceId: UUID!
  toState: String!
  metadata: JSON
}

input RegisterResourceTypeInput {
  name: String!
  description: String
  jsonSchema: JSON!
  transitions: JSON!
}

input GrantPermissionInput {
  identityId: UUID!
  resourceId: UUID
  resourceTypeId: UUID
  action: String!
  expiresAt: DateTime
}

input CreateRevisionInput {
  resourceId: UUID!
  fileContent: String 
  fileName: String
}

# --- Roots ---

type Query {
  """
  Retrieves a single Resource by its UUID.
  """
  resource(id: UUID!): Resource

  """
  List resources with optional filtering by type and cursor-based pagination.
  """
  resources(first: Int, after: String, typeName: String): ResourceConnection!
  
  """
  Retrieves a Resource Type definition by its unique name.
  """
  resourceType(name: String!): ResourceType

  """
  List all registered Resource Types.
  """
  resourceTypes: [ResourceType!]!
  
  """
  Lists all provisioned modules in the KORS ecosystem.
  """
  provisionedModules: [String!]!
}

type Mutation {
  """
  Registers a new identity (user, service, or system) in the KORS registry.
  Admin permission required.
  """
  createIdentity(input: CreateIdentityInput!): IdentityResult!

  """
  Soft-deletes a resource. The resource is hidden from all queries but preserved for audit trail.
  Requires 'admin' permission on the resource or its type.
  """
  deleteResource(id: UUID!): ResourceResult!

  """
  Registers a new Resource Type in KORS.
  Defining a type requires a JSON Schema for metadata validation and a set of allowed state transitions.
  """
  registerResourceType(input: RegisterResourceTypeInput!): ResourceTypeResult!
  
  """
  Creates a new Resource instance.
  The resource will be initialized with the provided state and metadata.
  This operation is tracked and triggers a 'kors.resource.created' event.
  """
  createResource(input: CreateResourceInput!): ResourceResult!

  """
  Triggers a state transition for an existing Resource.
  The transition must be allowed by the Resource Type's transition graph.
  """
  transitionResource(input: TransitionResourceInput!): ResourceResult!
  
  """
  Grants a specific permission to an identity (user or service).
  Permissions can be scoped to a specific resource or an entire resource type.
  """
  grantPermission(input: GrantPermissionInput!): PermissionResult!

  """
  Creates a new revision (snapshot) of a resource.
  Optionally attaches a file to the revision.
  """
  createRevision(input: CreateRevisionInput!): RevisionResult!
  
  """
  Provisions a new module by creating a dedicated database schema, user, and MinIO bucket.
  Only administrators can perform this action.
  """
  provisionModule(moduleName: String!): ProvisioningResult!

  """
  Removes a module and all its associated data (schema, user, bucket).
  """
  deprovisionModule(moduleName: String!): Boolean!

  """
  Uploads a file to the module's dedicated MinIO bucket.
  The file is isolated from other modules and can be accessed via the returned pre-signed URL.
  """
  uploadFile(input: UploadFileInput!): UploadResult!
}

type Subscription {
  eventWasPublished: Event!
  resourceEvents(resourceId: UUID!): Event!
}
