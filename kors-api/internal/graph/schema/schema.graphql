extend schema
  @link(url: "https://specs.apollo.dev/federation/v2.3",
        import: ["@key", "@shareable", "@extends", "@external"])

scalar UUID
scalar JSON
scalar DateTime

# --- KORS Primitives (Federated Entities) ---

type Identity @key(fields: "id") {
  id: UUID!
  externalId: String
  name: String!
  type: String!
  metadata: JSON
  createdAt: DateTime!
  updatedAt: DateTime!
}

type ResourceType @key(fields: "id") {
  id: UUID!
  name: String!
  description: String
  jsonSchema: JSON!
  transitions: JSON!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type Resource @key(fields: "id") {
  id: UUID!
  type: ResourceType!
  state: String!
  metadata: JSON!
  createdAt: DateTime!
  updatedAt: DateTime!
  revisions: [Revision!]!
}

type Event @key(fields: "id") {
  id: UUID!
  resource: Resource
  identity: Identity!
  type: String!
  payload: JSON!
  natsMessageId: UUID
  createdAt: DateTime!
}

type Revision @key(fields: "id") {
  id: UUID!
  resource: Resource!
  identity: Identity!
  snapshot: JSON!
  filePath: String
  downloadUrl: String
  createdAt: DateTime!
}

type Permission @key(fields: "id") {
  id: UUID!
  identity: Identity!
  resource: Resource
  resourceType: ResourceType
  action: String!
  expiresAt: DateTime
  createdAt: DateTime!
}

# --- Results ---

type MutationError {
  code: String!
  message: String!
}

type ResourceResult {
  success: Boolean!
  resource: Resource
  error: MutationError
}

type ResourceTypeResult {
  success: Boolean!
  resourceType: ResourceType
  error: MutationError
}

type PermissionResult {
  success: Boolean!
  permission: Permission
  error: MutationError
}

type RevisionResult {
  success: Boolean!
  revision: Revision
  error: MutationError
}

type ProvisioningResult {
  success: Boolean!
  moduleName: String
  schema: String
  username: String
  password: String
  error: MutationError
}

# --- Connections (Pagination) ---

type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
  endCursor: String
}

type ResourceConnection {
  edges: [ResourceEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type ResourceEdge {
  cursor: String!
  node: Resource!
}

# --- Inputs ---

input CreateResourceInput {
  typeName: String!
  initialState: String!
  metadata: JSON
}

input TransitionResourceInput {
  resourceId: UUID!
  toState: String!
  metadata: JSON
}

input RegisterResourceTypeInput {
  name: String!
  description: String
  jsonSchema: JSON!
  transitions: JSON!
}

input GrantPermissionInput {
  identityId: UUID!
  resourceId: UUID
  resourceTypeId: UUID
  action: String!
  expiresAt: DateTime
}

input CreateRevisionInput {
  resourceId: UUID!
  fileContent: String 
  fileName: String
}

# --- Roots ---

type Query {
  resource(id: UUID!): Resource
  resources(first: Int, after: String, typeName: String): ResourceConnection!
  
  resourceType(name: String!): ResourceType
  resourceTypes: [ResourceType!]!
}

type Mutation {
  registerResourceType(input: RegisterResourceTypeInput!): ResourceTypeResult!
  
  createResource(input: CreateResourceInput!): ResourceResult!
  transitionResource(input: TransitionResourceInput!): ResourceResult!
  
  grantPermission(input: GrantPermissionInput!): PermissionResult!
  createRevision(input: CreateRevisionInput!): RevisionResult!
  
  provisionModule(moduleName: String!): ProvisioningResult!
}

type Subscription {
  eventWasPublished: Event!
  resourceEvents(resourceId: UUID!): Event!
}
